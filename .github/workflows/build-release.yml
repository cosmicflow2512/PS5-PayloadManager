name: Build & Release

on:
  push:
    tags:
      - '*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to upload to (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file EXE
        run: |
          dotnet publish PS5AutoPayloadTool/PS5AutoPayloadTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/

      - name: Rename output
        run: |
          Rename-Item publish\PS5AutoPayloadTool.exe PS5AutoPayloadTool-win-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS5AutoPayloadTool-win-x64
          path: publish\PS5AutoPayloadTool-win-x64.exe
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || 'latest') }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('PS5 AutoPayload Tool {0}', github.ref_name) || (github.event_name == 'workflow_dispatch' && format('PS5 AutoPayload Tool {0}', github.event.inputs.tag_name) || 'PS5 AutoPayload Tool (latest)') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            ## PS5 AutoPayload Tool

            ### Download
            `PS5AutoPayloadTool-win-x64.exe` unten herunterladen — keine Installation nötig.

            ### Erster Start
            Beim ersten Start wird automatisch erstellt:
            ```
            %LOCALAPPDATA%\PS5Autopayload\
            ```

            ### Profil-Syntax (kompatibel mit PS5AutopayloadHA)
            ```
            # Kommentar
            payload.lua       # senden an Port 9026
            payload.elf       # senden an Port 9021
            !500              # 500 ms warten
            ?9026 60          # warten bis Port 9026 offen (60s timeout)
            ```
          files: publish\PS5AutoPayloadTool-win-x64.exe
          draft: false
