name: Build & Release

on:
  push:
    tags:
      - '*'           # triggers on any tag: v1.0.0, 1.0.0, etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file EXE
        run: |
          dotnet publish PS5AutoPayloadTool/PS5AutoPayloadTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/

      - name: Rename output
        run: |
          Rename-Item publish\PS5AutoPayloadTool.exe PS5AutoPayloadTool-win-x64.exe

      - name: Upload artifact (for manual trigger)
        uses: actions/upload-artifact@v4
        with:
          name: PS5AutoPayloadTool-win-x64
          path: publish\PS5AutoPayloadTool-win-x64.exe
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PS5 AutoPayload Tool ${{ github.ref_name }}
          body: |
            ## PS5 AutoPayload Tool ${{ github.ref_name }}

            ### Download
            Download `PS5AutoPayloadTool-win-x64.exe` below — no installation required.

            ### First launch
            On first run the app auto-creates its data folder at:
            ```
            %LOCALAPPDATA%\PS5Autopayload\
            ```
            Payloads and profiles are stored there.

            ### Profile syntax (compatible with PS5AutopayloadHA)
            ```
            # comment
            payload.lua          # send to port 9026
            payload.elf          # send to port 9021
            !500                 # delay 500 ms
            ?9026 60             # wait for port 9026 (60 s timeout)
            ```
          files: publish\PS5AutoPayloadTool-win-x64.exe
          draft: false
          prerelease: false
